name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore src/MTT.csproj -PackagesDirectory packages

      - name: Add MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild src/MTT.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:ReferencePath="${{ github.workspace }}/packages"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: src/bin/Release/MTT.exe
